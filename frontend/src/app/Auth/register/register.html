<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <h1 class="text-3xl font-bold text-center mb-6">
      Créer un compte
    </h1>

    <form (ngSubmit)="register()">

      <div class="mb-4">
        <label class="block text-gray-700 mb-2">
          Nom complet
        </label>
        <input
          type="text"
          name="nom"
          [(ngModel)]="utilisateur.nom"
          required
          class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500"
          placeholder="Votre nom"
        >
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2">
          Prenom
        </label>
        <input
          type="text"
          name="prenom"
          [(ngModel)]="utilisateur.prenom"
          required
          class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500"
          placeholder="Votre prenom"
        >
      </div>



      <div class="mb-4">
        <label class="block text-gray-700 mb-2">
          Email
        </label>
        <input
          type="email"
          name="email"
          [(ngModel)]="utilisateur.email"
          required
          class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500"
          placeholder="email@example.com"
        >
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2">
          Mot de passe
        </label>
        <input
          type="password"
          name="password"
          [(ngModel)]="utilisateur.password"
          required
          class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500"
          placeholder="********"
        >
      </div>

      <div class="mb-6">
        <label class="block text-gray-700 mb-2">
          Confirmer le mot de passe
        </label>
        <input
          type="password"
          name="confirmPassword"
          [(ngModel)]="utilisateur.confirmPassword"
          required
          class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500"
          placeholder="********"
        >
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2">
          telephone
        </label>
        <input
          type="text"
          name="telephone"
          [(ngModel)]="utilisateur.telephone"
          required
          class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500"
          placeholder="Votre telephone"
        >
      </div>

      <div class="mb-4">
        <label class="block text-gray-700 mb-2">
          photo
        </label>
        <input
          type="text"
          name="photo"
          [(ngModel)]="utilisateur.photo"
          required
          class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-green-500"
          placeholder="Votre photo"
        >
      </div>

      <button
        type="submit"
        class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition"
      >
        S'inscrire
      </button>

    </form>
    <div class="flex justify-between mt-4">

      <a
        routerLink="/login"
        class="text-blue-600 hover:underline"
      >
        Se connecter
      </a>

      <a
        routerLink="/etudiant"
        class="text-blue-600 hover:underline"
      >
        Enregistrer étudiant
      </a>

      <a
        routerLink="/formateur"
        class="text-blue-600 hover:underline"
      >
        Enregistrer formateur
      </a>

    </div>

  </div>
</div>
