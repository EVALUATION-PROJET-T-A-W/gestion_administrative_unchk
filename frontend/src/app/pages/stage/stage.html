<div class="min-h-screen flex items-center justify-center bg-gray-100 p-6">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-3xl">

    <h2>Gestion des stages</h2>

    <form (ngSubmit)="enregistrer()">

      <input
        type="text"
        [(ngModel)]="stage.entreprise"
        name="entreprise"
        placeholder="Entreprise"
        required>

      <input
        type="date"
        [(ngModel)]="stage.dateDebut"
        name="dateDebut"
        required>

      <input
        type="date"
        [(ngModel)]="stage.dateFin"
        name="dateFin"
        required>

      <textarea
        [(ngModel)]="stage.bilan"
        name="bilan"
        placeholder="Bilan du stage"
        required>
  </textarea>

      <input
        type="text"
        [(ngModel)]="stage.statut"
        name="statut"
        placeholder="Statut (en cours, terminé, annulé)"
        required>

      <input
        type="number"
        [(ngModel)]="stage.etudiantId"
        name="etudiantId"
        placeholder="Étudiant ID"
        required>

      <button type="submit">
        {{ modeEdition ? 'Modifier' : 'Ajouter' }}
      </button>

    </form>

    <hr>

    <table border="1">

      <thead>
      <tr>
        <th>Entreprise</th>
        <th>Date début</th>
        <th>Date fin</th>
        <th>Bilan</th>
        <th>Statut</th>
        <th>Étudiant ID</th>
        <th>Actions</th>
      </tr>
      </thead>

      <tbody>

      <tr *ngFor="let s of stages">

        <td>{{ s.entreprise }}</td>
        <td>{{ s.dateDebut }}</td>
        <td>{{ s.dateFin }}</td>
        <td>{{ s.bilan }}</td>
        <td>{{ s.statut }}</td>
        <td>{{ s.etudiantId }}</td>

        <td>
          <button (click)="modifier(s)">Modifier</button>
          <button (click)="supprimer(s.id)">Supprimer</button>
        </td>

      </tr>

      </tbody>

    </table>


  </div>

</div>
