<div class="min-h-screen flex items-center justify-center bg-gray-100 p-6">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-3xl">

    <h2 class="text-2xl font-bold mb-4">
      Liste des formateurs
    </h2>

    <table class="w-full border">
      <thead class="bg-gray-100">
      <tr>
        <th class="border p-2">Nom</th>
        <th class="border p-2">Prénom</th>
        <th class="border p-2">Email</th>
        <th class="border p-2">Téléphone</th>
        <th class="border p-2">motDePasse</th>
        <th class="border p-2">Spécialité</th>
        <th class="border p-2">grade</th>
        <th class="border p-2">departement</th>
        <th class="border p-2">photo</th>
        <th class="border p-2">typeFormateur</th>
        <th class="border p-2">Actions</th>
      </tr>
      </thead>

      <tbody>
      <tr *ngFor="let f of formateurs">

        <td class="border p-2">{{ f.nom }}</td>
        <td class="border p-2">{{ f.prenom }}</td>
        <td class="border p-2">{{ f.email }}</td>
        <td class="border p-2">{{ f.telephone }}</td>
        <td class="border p-2">{{ f.motDePasse }}</td>
        <td class="border p-2">{{ f.specialite }}</td>
        <td class="border p-2">{{ f.grade }}</td>
        <td class="border p-2">{{ f.departement }}</td>
        <td class="border p-2">{{ f.photo }}</td>
        <td class="border p-2">{{ f.typeFormateur }}</td>

        <td class="border p-2">
          <div class="flex gap-2 justify-center">

            <button
              (click)="modifier(f)"
              class="bg-yellow-500 text-white px-3 py-1 rounded"
            >
              Modifier
            </button>

            <button
              (click)="supprimer(f.id)"
              class="bg-red-600 text-white px-3 py-1 rounded"
            >
              Supprimer
            </button>

          </div>
        </td>

      </tr>

      <tr *ngIf="formateurs.length === 0">
        <td colspan="6" class="text-center p-4 text-gray-500">
          Aucun formateur
        </td>
      </tr>
      </tbody>
    </table>

  </div>

</div>
