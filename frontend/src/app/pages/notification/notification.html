<div class="min-h-screen flex items-center justify-center bg-gray-100 p-6">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-3xl">


    <h2>Gestion des notifications</h2>

    <form (ngSubmit)="enregistrer()">

      <input
        type="text"
        [(ngModel)]="notification.message"
        name="message"
        placeholder="Message"
        required>

      <input
        type="date"
        [(ngModel)]="notification.dateNotification"
        name="dateNotification"
        required>

      <input
        type="text"
        [(ngModel)]="notification.etat"
        name="etat"
        placeholder="État (lu / non lu)"
        required>

      <input
        type="number"
        [(ngModel)]="notification.utilisateurId"
        name="utilisateurId"
        placeholder="Utilisateur ID"
        required>

      <button type="submit">
        {{ modeEdition ? 'Modifier' : 'Ajouter' }}
      </button>

    </form>

    <hr>

    <table border="1">

      <thead>
      <tr>
        <th>Message</th>
        <th>Date</th>
        <th>État</th>
        <th>Utilisateur ID</th>
        <th>Actions</th>
      </tr>
      </thead>

      <tbody>

      <tr *ngFor="let n of notifications">

        <td>{{ n.message }}</td>
        <td>{{ n.dateNotification }}</td>
        <td>{{ n.etat }}</td>
        <td>{{ n.utilisateurId }}</td>

        <td>
          <button (click)="modifier(n)">Modifier</button>
          <button (click)="supprimer(n.id)">Supprimer</button>
        </td>

      </tr>

      </tbody>

    </table>

  </div>

</div>
