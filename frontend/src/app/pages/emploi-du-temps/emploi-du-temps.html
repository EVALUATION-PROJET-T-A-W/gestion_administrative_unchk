<div class="min-h-screen flex items-center justify-center bg-gray-100 p-6">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-3xl">


    <h2>Gestion des emplois du temps</h2>

    <form (ngSubmit)="enregistrer()">

      <input
        type="text"
        name="jour"
        [(ngModel)]="emploi.jour"
        placeholder="Jour"
        required>

      <input
        type="time"
        name="heureDebut"
        [(ngModel)]="emploi.heureDebut"
        required>

      <input
        type="time"
        name="heureFin"
        [(ngModel)]="emploi.heureFin"
        required>

      <input
        type="text"
        name="salle"
        [(ngModel)]="emploi.salle"
        placeholder="Salle"
        required>

      <input
        type="text"
        name="module"
        [(ngModel)]="emploi.module"
        placeholder="Module"
        required>

      <input
        type="number"
        name="formationId"
        [(ngModel)]="emploi.formationId"
        placeholder="Formation ID"
        required>

      <button type="submit">
        {{ modeEdition ? 'Modifier' : 'Ajouter' }}
      </button>

    </form>

    <hr>

    <table border="1">

      <thead>
      <tr>
        <th>Jour</th>
        <th>Heure Début</th>
        <th>Heure Fin</th>
        <th>Salle</th>
        <th>Module</th>
        <th>Formation ID</th>
        <th>Actions</th>
      </tr>
      </thead>

      <tbody>
      <tr *ngFor="let e of emplois">

        <td>{{ e.jour }}</td>
        <td>{{ e.heureDebut }}</td>
        <td>{{ e.heureFin }}</td>
        <td>{{ e.salle }}</td>
        <td>{{ e.module }}</td>
        <td>{{ e.formationId }}</td>

        <td>
          <button (click)="modifier(e)">
            Modifier
          </button>

          <button (click)="supprimer(e.id)">
            Supprimer
          </button>
        </td>

      </tr>
      </tbody>

    </table>

  </div>

</div>
